app = 'centaur-api'
primary_region = 'dfw'

[build]

[env]
  CENTAUR_FRONTEND_URL = "https://centaur.tools"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
