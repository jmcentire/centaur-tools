server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Agent-readiness: advertise machine-readable discovery on /.
    location = / {
        add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\", </llms.txt>; rel=\"alternate\"; type=\"text/markdown\", </llms-full.txt>; rel=\"alternate\"; type=\"text/markdown\"" always;

        # Markdown content negotiation: serve llms-full.txt when an agent asks for markdown.
        if ($http_accept ~* "text/markdown") {
            rewrite ^/$ /llms-full.txt last;
        }

        try_files $uri $uri/ $uri.html /index.html =404;
    }

    location /api/ {
        proxy_pass http://centaur-api.flycast:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Well-known content-type overrides (RFC 9727, etc.)
    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        try_files $uri =404;
    }

    location = /.well-known/capabilities.yaml {
        default_type application/yaml;
        try_files $uri =404;
    }

    location ~ ^/\.well-known/.+\.json$ {
        default_type application/json;
        try_files $uri =404;
    }

    location = /.well-known/http-message-signatures-directory {
        default_type application/json;
        try_files $uri =404;
    }

    # llms.txt family: serve as markdown so agents negotiating Accept: text/markdown succeed.
    location = /llms.txt {
        default_type text/markdown;
        try_files $uri =404;
    }

    location = /llms-full.txt {
        default_type text/markdown;
        try_files $uri =404;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files $uri =404;
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml application/linkset+json text/markdown application/yaml;
}
